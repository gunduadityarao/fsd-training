<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        input{
            border:1px solid black;
            border-radius: 5px;
            height: 25px;
            width:200px;
            box-sizing: border-box;
            padding:10px;
        }
        .container{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        body{
            background:linear-gradient(to bottom right,orange,yellow,orange);
            min-height:100vh;
        }
        button{
            background-color: green;
            width: 100px;
            height: 30px;
            color: white;
            border:0px;
            border-radius: 10px;

        }
        button:hover{
            transform:scale(1.05);
            cursor:pointer;
            transition:all 0.5s;

        }
        .card{
            margin:40px;
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: space-around;
            align-items: center;
            border: none;
            box-shadow: 0px 2px 4px rgb(244, 170, 170);
            width: 800px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 10px;
            height: auto;
            
            
        }
    </style>
</head>
<body>

    <h1>Weather</h1>
    <label for="cityname">City Name : </label>
    <input type="text" name="cityname" id="cityname" autofocus><br>
    <button type="button" onclick="display()">display</button>
    </div>
    
    <div class="container">
    <div id="data" class="card"></div>
    </div>
    <canvas id="weatherChart"></canvas>

</body>
</html>
