<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css"/>
    

</head>
<body>
    <header>
    <nav>
        <a href="index.html">Home</a>     <a href="login.html">Login</a>     <a href="register.html">Register</a>    
    </nav>
    </header>
    <h1>Register Page</h1>
    <hr>
    <br>
    <form onsubmit="register()" class="form">
    <label for="username">Username: </label>
    <input type="text" name="username" placeholder="Enter Username" id="username" required/><br><br>
    <label for="password">Password: </label>
    <input type="password" name="password" placeholder="Enter Password" id="password" required/><br><br>
    <label for="confirmpassword">Confirm Password: </label>
    <input type="password" name="confirmpassword" placeholder="Enter Password again" id="confirmpass" required/><br><br>
    <button type="submit">register</button><br><br>
    <small>
        Already have an account? <a href="login.html">Back to Login</a>
    </small>
    </form>
    <script>
        async function register(){
        let username=document.getElementById('username').value;
        let password=document.getElementById('password').value;
        let confirmpassword=document.getElementById('confirmpass').value;
        if(password===confirmpassword){
            const res=await fetch('http://localhost:3000/users',{
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({
                    username:username,
                    password:password
                })
        });
        }
        // const data=await res.json();
        alert('registration successful');
        }


    </script>
</body>
</html>
