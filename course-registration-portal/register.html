<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">
        <nav class="navbar navbar-expand-lg bg-success">
    <img src="https://i.pinimg.com/736x/cc/9b/be/cc9bbe385309a5ee04fa0a305cbd01cf.jpg" width="70px" height="70px" style="margin:10px;"/>
        <a class="navbar-brand" href="home.html">Student Management Portal</a>
        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbar-collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbar-collapse">
        <div class="navbar-nav">
        <a class="nav-link" href="home.html">Home</a>
        <a class="nav-link" href="about.html">About</a>
        <a class="nav-link" href="courses.html">Courses</a>
        <a class="nav-link" href="contact.html">Contact</a>
        </div>
        <a class="btn btn-primary ms-auto me-5" style="width: 120px; height:40px;" href="login.html">Login</a>
        </div>
    </nav>
    

    <div class="container my-5">

        <div class="w-75 mx-auto shadow-lg p-4 rounded border border-primary">

            <h1 class="text-center mb-4 text-primary">
                Student Registration Form
            </h1>

            <form>

                <!-- Full Name -->
                <label class="form-label">Full Name</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-person-fill"></i>
                    </span>
                    <input type="text" class="form-control" required>
                </div>

                <!-- Roll Number -->
                <label class="form-label">Roll Number</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-card-list"></i>
                    </span>
                    <input type="text" class="form-control" required>
                </div>

                <!-- Email -->
                <label class="form-label">Email</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>
                    <input type="email" class="form-control" required>
                </div>

                <!-- Mobile -->
                <label class="form-label">Mobile Number</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-telephone-fill"></i>
                    </span>
                    <input type="tel" class="form-control" required>
                </div>

                <!-- Gender -->
                <label class="form-label">Gender</label>

                <div class="form-check">
                    <input class="form-check-input" type="radio" name="gender" id="male" required>
                    <label class="form-check-label" for="male">
                        Male
                    </label>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="radio" name="gender" id="female" required>
                    <label class="form-check-label" for="female">
                        Female
                    </label>
                </div>

                <!-- Branch -->
                <label class="form-label">Branch</label>
                <select class="form-select mb-3" required>
                    <option value="" selected disabled>Select Branch</option>
                    <option>CSE</option>
                    <option>CSM</option>
                    <option>CSD</option>
                    <option>ECE</option>
                    <option>EEE</option>
                    <option>IT</option>
                    <option>Civil</option>
                    <option>Mechanical</option>
                </select>

                <!-- DOB -->
                <label class="form-label">Date of Birth</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-calendar-date-fill"></i>
                    </span>
                    <input type="date" class="form-control" required>
                </div>

                <!-- Address -->
                <label class="form-label">Address</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-geo-alt-fill"></i>
                    </span>
                    <textarea rows="4" class="form-control" required></textarea>
                </div>

                <!-- Photo Upload -->
                <label class="form-label">Upload Photo</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-image-fill"></i>
                    </span>
                    <input type="file" class="form-control" accept="image/*" required>
                </div>

                <!-- Terms -->
                <div class="form-check mb-3">
                    <input type="checkbox" class="form-check-input" id="terms" required>
                    <label class="form-check-label" for="terms">
                        Accept Terms and Conditions
                    </label>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-person-plus-fill"></i>
                    Register
                </button>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
