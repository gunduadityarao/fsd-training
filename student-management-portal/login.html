<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>

<body class="bg-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg bg-success">
        <img src="https://i.pinimg.com/736x/cc/9b/be/cc9bbe385309a5ee04fa0a305cbd01cf.jpg"
             width="70" height="70" style="margin:10px;">

        <a class="navbar-brand" href="home.html">
            Student Management Portal
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse"
                data-bs-target="#navbar-collapse" type="button">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbar-collapse">
            <div class="navbar-nav">
                <a class="nav-link" href="home.html">Home</a>
                <a class="nav-link" href="about.html">About</a>
                <a class="nav-link" href="courses.html">Courses</a>
                <a class="nav-link" href="contact.html">Contact</a>
            </div>

            <a class="btn btn-primary ms-auto me-5"
               style="width:120px; height:40px;"
               href="register.html">
               Register
            </a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="container my-5">

        <div class="w-50 mx-auto shadow-lg p-4 rounded border border-primary">

            <h1 class="text-center text-primary mb-4">
                Student Login
            </h1>

            <form>

                <!-- Email -->
                <label class="form-label">Email Address</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-envelope-fill"></i>
                    </span>
                    <input type="email"
                           class="form-control"
                           placeholder="Enter your email"
                           required>
                </div>

                <!-- Password -->
                <label class="form-label">Password</label>
                <div class="input-group mb-3">
                    <span class="input-group-text">
                        <i class="bi bi-lock-fill"></i>
                    </span>
                    <input type="password"
                           class="form-control"
                           placeholder="Enter your password"
                           required>
                </div>

                <!-- Remember Me -->
                <div class="form-check mb-3">
                    <input class="form-check-input"
                           type="checkbox"
                           id="remember">
                    <label class="form-check-label" for="remember">
                        Remember Me
                    </label>
                </div>

                <!-- Login Button -->
                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Login
                </button>

                <!-- Links -->
                <div class="text-center">
                    <a href="#" class="text-decoration-none">
                        Forgot Password?
                    </a>
                    <br><br>
                    <span>Don't have an account?</span>
                    <a href="register.html" class="text-decoration-none">
                        Register Here
                    </a>
                </div>

            </form>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
